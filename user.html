<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGWCEIS Training Institute - User Fuel Portal</title>
    <style>
        :root {
            --primary-blue: #0A2540;
            --ocean-blue: #0073CF;
            --light-bg: #F4F6F9;
            --white: #FFFFFF;
            --gray-text: #4A5568;
            --border-color: #E2E8F0;
            --accent-gold: #D4AF37;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--light-bg); color: #333; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--white); padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { display: flex; align-items: center; border-bottom: 3px double var(--ocean-blue); padding-bottom: 20px; margin-bottom: 20px; }
        .header-logo-img { width: 105px; height: 105px; object-fit: contain; margin-right: 20px; }
        .header-text h1 { font-size: 22px; color: var(--primary-blue); text-transform: uppercase; letter-spacing: 0.5px; }
        .header-text h2 { font-size: 15px; color: var(--ocean-blue); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
        
        .controls-bar { background-color: #F8FAFC; border: 1px solid var(--border-color); padding: 15px; border-radius: 6px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .select-input { padding: 8px 12px; border: 1px solid var(--border-color); border-radius: 4px; font-weight: 600; color: var(--primary-blue); background: var(--white); }
        
        .tabs-nav { display: flex; border-bottom: 2px solid var(--border-color); margin-bottom: 25px; gap: 5px; }
        .tab-btn { background: #E2E8F0; color: var(--gray-text); border: none; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; border-top-left-radius: 6px; border-top-right-radius: 6px; flex: 1; }
        .tab-btn.active { background: var(--ocean-blue); color: var(--white); border-bottom: 3px solid var(--accent-gold); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        
        .section-title { font-size: 16px; color: var(--primary-blue); border-left: 5px solid var(--ocean-blue); padding-left: 10px; margin-bottom: 20px; text-transform: uppercase; font-weight: bold; }
        .form-group { margin-bottom: 18px; }
        .form-row { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .form-row { grid-template-columns: 1fr 1fr; } }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--primary-blue); }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 4px; font-size: 14px; }
        .radio-group { display: flex; gap: 20px; padding-top: 5px; }
        .radio-option { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        
        .btn-submit { background-color: var(--ocean-blue); color: var(--white); border: none; padding: 12px 24px; font-size: 14px; font-weight: bold; text-transform: uppercase; border-radius: 4px; cursor: pointer; width: 100%; transition: background-color 0.2s; }
        .btn-submit:hover { background-color: var(--secondary-blue); }
        
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .status-badge.pending { background-color: #FEF3C7; color: #D97706; }
        .status-badge.approved { background-color: #D1FAE5; color: #059669; }
        
        .portal-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .portal-table th, .portal-table td { border: 1px solid var(--border-color); padding: 12px; text-align: left; }
        .portal-table th { background-color: #F8FAFC; color: var(--primary-blue); }
        .empty-row-msg { text-align: center; color: var(--gray-text); font-style: italic; }
        .footer { text-align: center; margin-top: 40px; font-size: 11px; color: var(--gray-text); border-top: 1px solid var(--border-color); padding-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img class="header-logo-img" src="PCG.jpg" alt="PCG Logo">
            <div class="header-text">
                <h1>CGWCEIS Training Institute</h1>
                <h2>Fuel Management Portal - Personnel Request Dashboard</h2>
            </div>
        </div>

        <div class="controls-bar">
            <div>
                <label for="globalMonthFilter" style="font-weight:bold; font-size:13px; color:var(--primary-blue);">View Tracked Month:</label>
                <select id="globalMonthFilter" class="select-input" onchange="renderApprovalTable()">
                    <option value="2026-05">May 2026</option>
                    <option value="2026-06" selected>June 2026</option>
                    <option value="2026-07">July 2026</option>
                </select>
            </div>
            <div style="font-size: 12px; color: var(--gray-text);">Role Context: <strong>Requesting Party</strong></div>
        </div>

        <div class="tabs-nav">
            <button class="tab-btn active" id="btn-request" onclick="switchTab('tab-request')">1. Request Fuel</button>
            <button class="tab-btn" id="btn-approval" onclick="switchTab('tab-approval')">2. Approval Status</button>
        </div>

        <!-- TAB 1: Request Form -->
        <div id="tab-request" class="tab-panel active">
            <div class="section-title">Fuel Requisition Form</div>
            <form id="fuelRequestForm" onsubmit="handleFormSubmit(event)">
                <div class="form-row">
                    <div class="form-group"><label for="officerName">Requesting Personnel / Officer</label><input type="text" id="officerName" required placeholder="e.g., ENS Juan Dela Cruz PCG"></div>
                    <div class="form-group"><label for="officerRank">Rank / Designation</label><input type="text" id="officerRank" required placeholder="e.g., Instructor / Logistics Officer"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label for="unitStation">Branch / Section</label><input type="text" id="unitStation" required placeholder="e.g., Training Support Branch"></div>
                    <div class="form-group"><label for="vesselVehicle">Vessel Hull No. / Vehicle Plate No.</label><input type="text" id="vesselVehicle" required placeholder="e.g., SJA-1234"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Type of Fuel Required</label><div class="radio-group"><label class="radio-option"><input type="radio" name="fuelType" value="Gasoline" required> Gasoline</label><label class="radio-option"><input type="radio" name="fuelType" value="Diesel" required> Diesel</label></div></div>
                    <div class="form-group"><label for="quantity">Quantity Requested (Liters)</label><input type="number" id="quantity" min="0.01" step="0.01" oninput="calculateTotalCost()" required placeholder="0.00"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label for="fuelPrice">Manual Fuel Price Per Liter (PHP)</label><input type="number" id="fuelPrice" min="0.01" step="0.01" oninput="calculateTotalCost()" required placeholder="0.00"></div>
                    <div class="form-group"><label for="estimatedCost">Total Calculated Cost (PHP)</label><input type="number" id="estimatedCost" placeholder="0.00" readonly style="background-color: #E2E8F0; font-weight: bold;"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label for="requestDate">Date of Request</label><input type="date" id="requestDate" required></div>
                </div>
                <div class="form-group"><label for="purpose">Purpose of Official Mission</label><textarea id="purpose" required placeholder="Detail usage parameters (e.g., generator operations, transport of trainees)..."></textarea></div>
                <button type="submit" class="btn-submit">Submit Fuel Request</button>
            </form>
        </div>

        <!-- TAB 2: Approval Status -->
        <div id="tab-approval" class="tab-panel">
            <div class="section-title">Track Requisition Status</div>
            <table class="portal-table" id="approvalTable">
                <thead><tr><th>Req ID</th><th>Vessel/Vehicle</th><th>Fuel Type</th><th>Volume</th><th>Total Cost</th><th>Status</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="footer"><p>© 2026 CGWCEIS Training Institute. All Rights Reserved.</p></div>
    </div>

    <script>
        document.getElementById('requestDate').value = new Date().toISOString().split('T')[0];

        function getDB() { return JSON.parse(localStorage.getItem('pcg_fuel_db')) || []; }
        function saveDB(db) { localStorage.setItem('pcg_fuel_db', JSON.stringify(db)); }

        function calculateTotalCost() {
            const qty = parseFloat(document.getElementById('quantity').value) || 0;
            const price = parseFloat(document.getElementById('fuelPrice').value) || 0;
            document.getElementById('estimatedCost').value = (qty * price).toFixed(2);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('btn-' + tabId.split('-')[1]).classList.add('active');
            if(tabId === 'tab-approval') renderApprovalTable();
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const db = getDB();
            const dateVal = document.getElementById('requestDate').value;
            const transactionMonth = dateVal.substring(0, 7);

            const newRequest = {
                id: 'id-' + Date.now(),
                reqId: `#TI-2026-${String(db.length + 1).padStart(3, '0')}`,
                monthGroup: transactionMonth,
                vesselVehicle: document.getElementById('vesselVehicle').value,
                fuelType: document.querySelector('input[name="fuelType"]:checked').value,
                quantity: parseFloat(document.getElementById('quantity').value),
                cost: parseFloat(document.getElementById('estimatedCost').value),
                status: 'pending',
                date: dateVal,
                description: `${document.querySelector('input[name="fuelType"]:checked').value} Request - ${document.getElementById('vesselVehicle').value}`
            };

            db.push(newRequest);
            saveDB(db);
            alert(`Success! Requisition ${newRequest.reqId} dispatched to management ledger.`);
            document.getElementById('globalMonthFilter').value = transactionMonth;
            document.getElementById('fuelRequestForm').reset();
            document.getElementById('requestDate').value = new Date().toISOString().split('T')[0];
            switchTab('tab-approval');
        }

        function renderApprovalTable() {
            const selectedMonth = document.getElementById('globalMonthFilter').value;
            const tbody = document.getElementById('approvalTable').getElementsByTagName('tbody')[0];
            tbody.innerHTML = '';
            
            const filtered = getDB().filter(r => r.monthGroup === selectedMonth);
            if(filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty-row-msg">No requisitions submitted for this accounting period.</td></tr>`;
                return;
            }

            filtered.forEach(req => {
                const row = tbody.insertRow();
                const badgeClass = req.status === 'pending' ? 'pending' : 'approved';
                row.innerHTML = `
                    <td><strong>${req.reqId}</strong></td>
                    <td>${req.vesselVehicle}</td>
                    <td>${req.fuelType}</td>
                    <td>${req.quantity} L</td>
                    <td>₱${req.cost.toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                    <td><span class="status-badge ${badgeClass}">${req.status === 'pending' ? 'Pending Review' : 'Approved'}</span></td>
                `;
            });
        }
        renderApprovalTable();
    </script>
</body>
</html>
